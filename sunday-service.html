<!DOCTYPE html>
<html>
<head>
<title>Sunday Service Gallery</title>

<style>

</style>
</head>

<body>

<header>
<h1>Sunday Service Gallery</h1>
</header>

<a href="index.html" style="
display:inline-block;
margin:10px 20px;
text-decoration:none;
color:#0d47a1;
font-weight:bold;
">
← Back to Gallery
</a>
  
<div id="loader">

    <div class="spinner"></div>

    <p>Loading Photos...</p>

</div>

<div class="gallery" id="gallery">

</div>

<div id="lightbox" class="lightbox">

    <span class="close-btn" onclick="closeImage()">
        &times;
    </span>

    <a id="download-btn" href="" download>
        ⬇ Download Photo
    </a>

    <button class="nav-btn prev-btn" onclick="previousImage(event)">
        ←
    </button>

    <img id="lightbox-img">

    <div id="photo-counter">
      Photo 1 of 1
    </div>

    <button class="nav-btn next-btn" onclick="nextImage(event)">
    →
</button>

</div>

<script>

let images = [];
let currentIndex = 0;

const API_URL =
"https://script.google.com/macros/s/AKfycbxjn5j5iE8jNRT-_2RagOCCt_SrO9thtgyxLJpiUWFs4De-AF4y-WLJuyzUTLe_EMAh/exec";

fetch(API_URL)
.then(response => response.json())
.then(data => {

    images = data;

    const gallery =
    document.getElementById("gallery");

    let html = "";

    data.forEach(photo => {

        html += `
        <img src="${photo.url}"
        loading="lazy"
        onclick="openImage('${photo.url}')">
        `;

    });

    gallery.innerHTML = html;

document
.getElementById("loader")
.style.display = "none";

})

.catch(error => {

    console.error(error);

});

function openImage(src){

    currentIndex =
    images.findIndex(photo => photo.url === src);

    const photo =
    images[currentIndex];

    document
    .getElementById("lightbox")
    .style.display = "flex";

    document
    .getElementById("lightbox-img")
    .src = photo.url;

    document
    .getElementById("download-btn")
    .href = photo.download;

    document
    .getElementById("photo-counter")
    .innerText =
    `Photo ${currentIndex + 1} of ${images.length}`;

}

function closeImage(){

    document
    .getElementById("lightbox")
    .style.display = "none";

}

function nextImage(event){

    event.stopPropagation();

    currentIndex++;

    if(currentIndex >= images.length){

        currentIndex = 0;

    }

    updateImage();

}

function previousImage(event){

    event.stopPropagation();

    currentIndex--;

    if(currentIndex < 0){

        currentIndex =
        images.length - 1;

    }

    updateImage();

}

function updateImage(){

    const photo =
    images[currentIndex];

    document
    .getElementById("lightbox-img")
    .src = photo.url;

    document
    .getElementById("download-btn")
    .href = photo.download;
  
    document
    .getElementById("photo-counter")
    .innerText =
    `Photo ${currentIndex + 1} of ${images.length}`;

}

document.addEventListener("keydown", function(event){

    if(
        document.getElementById("lightbox")
        .style.display !== "flex"
    ){
        return;
    }

    if(event.key === "ArrowRight"){

        nextImage({
            stopPropagation:function(){}
        });

    }

    if(event.key === "ArrowLeft"){

        previousImage({
            stopPropagation:function(){}
        });

    }

    if(event.key === "Escape"){

        closeImage();

    }

});

let touchStartX = 0;
let touchEndX = 0;

document
.getElementById("lightbox")
.addEventListener("touchstart", function(e){

    touchStartX =
    e.changedTouches[0].screenX;

});

document
.getElementById("lightbox")
.addEventListener("touchend", function(e){

    touchEndX =
    e.changedTouches[0].screenX;

    handleSwipe();

});

function handleSwipe(){

    if(touchEndX < touchStartX - 50){

        nextImage({
            stopPropagation:function(){}
        });

    }

    if(touchEndX > touchStartX + 50){

        previousImage({
            stopPropagation:function(){}
        });

    }

}

</script>

</body>
</html>
