<!DOCTYPE html>
<html>
<head>
<title>Sunday Service Gallery</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

header{
background:#0d47a1;
color:white;
padding:20px;
text-align:center;
}

.gallery{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.gallery img{
width:100%;
aspect-ratio:4/3;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:.3s;
display:block;
}

.gallery img:hover{
transform:scale(1.03);
}

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
z-index:9999;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}
  
.close-btn{
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:50px;
    cursor:pointer;
    font-weight:bold;
}

#download-btn{
    position:absolute;
    top:30px;
    left:30px;
    background:white;
    color:#0d47a1;
    text-decoration:none;
    padding:10px 15px;
    border-radius:8px;
    font-weight:bold;
}

.nav-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:40px;
    background:rgba(255,255,255,.2);
    color:white;
    border:none;
    padding:15px;
    cursor:pointer;
    border-radius:10px;
}

.prev-btn{
    left:20px;
}

.next-btn{
    right:20px;
}

#photo-counter{
    position:absolute;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,.6);
    color:white;
    padding:8px 15px;
    border-radius:20px;
    font-size:14px;
}

#loader{
    text-align:center;
    padding:50px;
}

.spinner{
    width:50px;
    height:50px;
    border:5px solid #ddd;
    border-top:5px solid #0d47a1;
    border-radius:50%;
    margin:auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{

    0%{
        transform:rotate(0deg);
    }

    100%{
        transform:rotate(360deg);
    }

}
  
</style>
</head>

<body>

<header>
<h1>Sunday Service Gallery</h1>
</header>

<a href="index.html" style="
display:inline-block;
margin:10px 20px;
text-decoration:none;
color:#0d47a1;
font-weight:bold;
">
← Back to Gallery
</a>
  
<div id="loader">

    <div class="spinner"></div>

    <p>Loading Photos...</p>

</div>

<div class="gallery" id="gallery">

</div>

<div id="lightbox" class="lightbox">

    <span class="close-btn" onclick="closeImage()">
        &times;
    </span>

    <a id="download-btn" href="" download>
        ⬇ Download Photo
    </a>

    <button class="nav-btn prev-btn" onclick="previousImage(event)">
        ←
    </button>

    <img id="lightbox-img">

    <div id="photo-counter">
      Photo 1 of 1
    </div>

    <button class="nav-btn next-btn" onclick="nextImage(event)">
    →
</button>

</div>

<script>

let images = [];
let currentIndex = 0;

const API_URL =
"https://script.google.com/macros/s/AKfycbxjn5j5iE8jNRT-_2RagOCCt_SrO9thtgyxLJpiUWFs4De-AF4y-WLJuyzUTLe_EMAh/exec";

fetch(API_URL)
.then(response => response.json())
.then(data => {

    images = data;

    const gallery =
    document.getElementById("gallery");

    let html = "";

    data.forEach(photo => {

        html += `
        <img src="${photo.url}"
        loading="lazy"
        onclick="openImage('${photo.url}')">
        `;

    });

    gallery.innerHTML = html;

document
.getElementById("loader")
.style.display = "none";

})

.catch(error => {

    console.error(error);

});

function openImage(src){

    currentIndex =
    images.findIndex(photo => photo.url === src);

    const photo =
    images[currentIndex];

    document
    .getElementById("lightbox")
    .style.display = "flex";

    document
    .getElementById("lightbox-img")
    .src = photo.url;

    document
    .getElementById("download-btn")
    .href = photo.download;

    document
    .getElementById("photo-counter")
    .innerText =
    `Photo ${currentIndex + 1} of ${images.length}`;

}

function closeImage(){

    document
    .getElementById("lightbox")
    .style.display = "none";

}

function nextImage(event){

    event.stopPropagation();

    currentIndex++;

    if(currentIndex >= images.length){

        currentIndex = 0;

    }

    updateImage();

}

function previousImage(event){

    event.stopPropagation();

    currentIndex--;

    if(currentIndex < 0){

        currentIndex =
        images.length - 1;

    }

    updateImage();

}

function updateImage(){

    const photo =
    images[currentIndex];

    document
    .getElementById("lightbox-img")
    .src = photo.url;

    document
    .getElementById("download-btn")
    .href = photo.download;
  
    document
    .getElementById("photo-counter")
    .innerText =
    `Photo ${currentIndex + 1} of ${images.length}`;

}

document.addEventListener("keydown", function(event){

    if(
        document.getElementById("lightbox")
        .style.display !== "flex"
    ){
        return;
    }

    if(event.key === "ArrowRight"){

        nextImage({
            stopPropagation:function(){}
        });

    }

    if(event.key === "ArrowLeft"){

        previousImage({
            stopPropagation:function(){}
        });

    }

    if(event.key === "Escape"){

        closeImage();

    }

});

let touchStartX = 0;
let touchEndX = 0;

document
.getElementById("lightbox")
.addEventListener("touchstart", function(e){

    touchStartX =
    e.changedTouches[0].screenX;

});

document
.getElementById("lightbox")
.addEventListener("touchend", function(e){

    touchEndX =
    e.changedTouches[0].screenX;

    handleSwipe();

});

function handleSwipe(){

    if(touchEndX < touchStartX - 50){

        nextImage({
            stopPropagation:function(){}
        });

    }

    if(touchEndX > touchStartX + 50){

        previousImage({
            stopPropagation:function(){}
        });

    }

}

</script>

</body>
</html>
