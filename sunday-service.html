<!DOCTYPE html>
<html>
<head>
<title>Sunday Service Gallery</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

header{
background:#0d47a1;
color:white;
padding:20px;
text-align:center;
}

.gallery{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.03);
}

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
z-index:9999;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}
  
.close-btn{
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:50px;
    cursor:pointer;
    font-weight:bold;
}

#download-btn{
    position:absolute;
    top:30px;
    left:30px;
    background:white;
    color:#0d47a1;
    text-decoration:none;
    padding:10px 15px;
    border-radius:8px;
    font-weight:bold;
}

.nav-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:40px;
    background:rgba(255,255,255,.2);
    color:white;
    border:none;
    padding:15px;
    cursor:pointer;
    border-radius:10px;
}

.prev-btn{
    left:20px;
}

.next-btn{
    right:20px;
}

</style>
</head>

<body>

<header>
<h1>Sunday Service Gallery</h1>
</header>

<a href="index.html" style="
display:inline-block;
margin:10px 20px;
text-decoration:none;
color:#0d47a1;
font-weight:bold;
">
← Back to Gallery
</a>
  
<div class="gallery" id="gallery">
  
</div>

<div id="lightbox" class="lightbox">

    <span class="close-btn" onclick="closeImage()">
        &times;
    </span>

    <a id="download-btn" href="" download>
        ⬇ Download Photo
    </a>

    <button class="nav-btn prev-btn" onclick="previousImage(event)">
        ←
    </button>

    <img id="lightbox-img">

    <button class="nav-btn next-btn" onclick="nextImage(event)">
        →
    </button>

</div>

<script>

let images = [];

let currentIndex = 0;

const API_URL =
"https://script.google.com/macros/s/AKfycbxjn5j5iE8jNRT-_2RagOCCt_SrO9thtgyxLJpiUWFs4De-AF4y-WLJuyzUTLe_EMAh/exec";


fetch(API_URL)
.then(response => response.json())
.then(data => {

    images = data.map(photo => photo.url);

    const gallery =
    document.getElementById("gallery");

    data.forEach(photo => {

        gallery.innerHTML += `
        <img src="${photo.url}"
        onclick="openImage('${photo.url}')">
        `;

    });

})
.catch(error => {

    console.error(error);

});


function openImage(src){

    currentIndex =
    images.indexOf(src);

    document
    .getElementById("lightbox")
    .style.display = "flex";

    document
    .getElementById("lightbox-img")
    .src = src;

    document
    .getElementById("download-btn")
    .href = src;

}


function closeImage(){

    document
    .getElementById("lightbox")
    .style.display = "none";

}


function nextImage(event){

    event.stopPropagation();

    currentIndex++;

    if(currentIndex >= images.length){

        currentIndex = 0;

    }

    updateImage();

}


function previousImage(event){

    event.stopPropagation();

    currentIndex--;

    if(currentIndex < 0){

        currentIndex =
        images.length - 1;

    }

    updateImage();

}


function updateImage(){

    let src =
    images[currentIndex];

    document
    .getElementById("lightbox-img")
    .src = src;

    document
    .getElementById("download-btn")
    .href = src;

}

</script>

</body>
</html>
