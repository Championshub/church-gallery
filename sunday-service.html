<!DOCTYPE html>
<html>
<head>
<title>Sunday Service Gallery</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

header{
background:#0d47a1;
color:white;
padding:20px;
text-align:center;
}

.gallery{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.03);
}

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
z-index:9999;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

</style>
</head>

<body>

<header>
<h1>Sunday Service Gallery</h1>
</header>

<a href="index.html" style="
display:inline-block;
margin:10px 20px;
text-decoration:none;
color:#0d47a1;
font-weight:bold;
">
← Back to Gallery
</a>
  
<div class="gallery">

<img src="https://picsum.photos/1200/800?11" onclick="openImage(this.src)">
<img src="https://picsum.photos/1200/800?12" onclick="openImage(this.src)">
<img src="https://picsum.photos/1200/800?13" onclick="openImage(this.src)">
<img src="https://picsum.photos/1200/800?14" onclick="openImage(this.src)">

</div>

<div id="lightbox" class="lightbox">

    <span class="close-btn" onclick="closeImage()">&times;</span>

    <a id="download-btn" download>
        Download Photo
    </a>

    <img id="lightbox-img">

</div>

<script>

<script>

function openImage(src){
    document.getElementById("lightbox").style.display="flex";
    document.getElementById("lightbox-img").src = src;
    document.getElementById("download-btn").href = src;
}

function closeImage(){
    document.getElementById("lightbox").style.display="none";
}

.close-btn{
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:40px;
    cursor:pointer;
}

#download-btn{
    position:absolute;
    top:25px;
    left:30px;
    background:white;
    color:#0d47a1;
    padding:10px 15px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

#download-btn:hover{
    background:#f0f0f0;
}
</script>
</body>
</html>
